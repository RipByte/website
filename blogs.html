<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Archive - Cybersecurity</title>
    <link rel="stylesheet" href="./css/blog-archive.css" />
  </head>
  <body>
    <header>
      <a href="/" class="back-link">&lt; Back to Home</a>
      <h1>Blog Archive</h1>
    </header>

    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        placeholder="Search blogs by title..."
        class="search-bar"
      />
      <div class="search-info" id="searchInfo"></div>
    </div>

    <main class="blog-archive">
      <div class="blog-list" id="blogList"></div>
    </main>

    <footer>
      <a href="/" class="back-link">← Back to Home</a>
    </footer>

    <script src="./js/blog-search.js"></script>
  </body>
</html>
